apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
  namespace: dev
  labels:
    app.kubernetes.io/instance: api-dev
spec:
  replicas: 2 
  selector:
    matchLabels:
      app.kubernetes.io/instance: api-dev
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: api-dev
    spec:
      containers:
      - name: api
        image: ayaan49/api
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
         

