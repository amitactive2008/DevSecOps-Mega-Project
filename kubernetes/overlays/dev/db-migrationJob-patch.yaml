apiVersion: batch/v1
kind: Job
metadata:
  name: database-migration
  namespace: dev
spec:
  template:
    spec:
      containers:
      - name: migration
        image: ayaan49/api
        resources:
          requests: 
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
