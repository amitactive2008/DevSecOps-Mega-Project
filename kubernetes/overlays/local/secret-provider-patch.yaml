# Replaces the base AWS SecretProviderClass with a Vault-based one.
# Vault is installed in the 'vault' namespace in dev mode.
# The role 'app-role' must be created in Vault's Kubernetes auth backend.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: app-secrets
spec:
  provider: vault
  parameters:
    vaultAddress: "http://vault.vault.svc.cluster.local:8200"
    roleName: "app-role"
    objects: |
      - objectName: "DB_USERNAME"
        secretPath: "secret/data/app"
        secretKey: "DB_USERNAME"
      - objectName: "DB_PASSWORD"
        secretPath: "secret/data/app"
        secretKey: "DB_PASSWORD"
      - objectName: "JWT_SECRET"
        secretPath: "secret/data/app"
        secretKey: "JWT_SECRET"
