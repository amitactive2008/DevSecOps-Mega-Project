# ESO ClusterSecretStore — connects to Vault using a token stored in a K8s Secret.
# The token secret (vault-token) is created manually during setup (see Phase 7 of the guide).
# It is NOT committed to Git — create it with:
#   kubectl create secret generic vault-token \
#     --from-literal=token=root \
#     -n external-secrets
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: vault-backend
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "secret"
      version: "v2"
      auth:
        tokenSecretRef:
          name: vault-token
          namespace: external-secrets
          key: token
