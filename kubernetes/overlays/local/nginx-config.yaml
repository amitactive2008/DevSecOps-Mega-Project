# Overrides the nginx config baked into the client image.
# The image was built with 'api-service.dev.svc.cluster.local' hardcoded.
# This ConfigMap uses the short name 'api-service' which K8s DNS resolves
# to api-service.<namespace>.svc.cluster.local automatically.
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
data:
  default.conf: |
    server {
      listen 80;
      server_name localhost;

      root /usr/share/nginx/html;
      index index.html;

      location ~* \.(js|css|json|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        try_files $uri =404;
        access_log off;
        expires 1y;
      }

      location /api/ {
        proxy_pass http://api-service:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
      }

      location / {
        try_files $uri /index.html;
      }
    }
