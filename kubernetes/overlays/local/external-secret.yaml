# ESO ExternalSecret — pulls DB_USERNAME, DB_PASSWORD, JWT_SECRET from Vault
# and materializes them as a Kubernetes Secret named 'app-secrets' in the local namespace.
# The API deployment and migration job use this Secret via envFrom.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: app-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: app-secrets
    creationPolicy: Owner
  data:
    - secretKey: DB_USER        # maps to process.env.DB_USER in config/config.js
      remoteRef:
        key: app
        property: DB_USERNAME
    - secretKey: DB_PASSWORD
      remoteRef:
        key: app
        property: DB_PASSWORD
    - secretKey: JWT_SECRET
      remoteRef:
        key: app
        property: JWT_SECRET
