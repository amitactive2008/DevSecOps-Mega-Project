- op: add
  path: /metadata/annotations
  value:
    cert-manager.io/cluster-issuer: letsencrypt-prod

- op: add
  path: /spec/tls
  value:
    - hosts:
        - prod-holymolyops.deployops.fun
      secretName: tls-secret

- op: add
  path: /spec/rules/0/host
  value: prod-holymolyops.deployops.fun
