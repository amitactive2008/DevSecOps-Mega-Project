apiVersion: v1
kind: Pod
spec:
  securityContext:
    fsGroup: 1000

  volumes:
    - name: workspace-volume
      emptyDir: {}

  containers:
    - name: jnlp
      image: jenkins/inbound-agent
      args:
        - "$(JENKINS_SECRET)"
        - "$(JENKINS_NAME)"
      volumeMounts:
        - name: workspace-volume
          mountPath: /home/jenkins/agent

    - name: kubectl
      image: bitnami/kubectl:latest
      command: ["cat"]
      tty: true
      securityContext:
        runAsUser: 0
        runAsNonRoot: false
      volumeMounts:
        - name: workspace-volume
          mountPath: /home/jenkins/agent
