# Template for Jenkins runtime credentials.
# Copy this to jenkins/setup/credentials.yaml, fill in real values, then run:
#   kubectl apply -f jenkins/setup/credentials.yaml
#
# IMPORTANT: Do NOT commit credentials.yaml to Git.
#            Add it to .gitignore before creating it.
---
apiVersion: v1
kind: Secret
metadata:
  name: jenkins-credentials
  namespace: jenkins
type: Opaque
stringData:
  # DockerHub account used by the pipeline to push images
  DOCKERHUB_USERNAME: "amitactive2008"
  DOCKERHUB_PASSWORD: "<your-dockerhub-access-token>"

  # NVD API key for OWASP Dependency-Check (free at https://nvd.nist.gov/developers/request-an-api-key)
  NVD_API_KEY: "<your-nvd-api-key>"
