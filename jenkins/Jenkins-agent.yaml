apiVersion: v1
kind: Pod
spec:
  containers: 
    - name: jnlp
      image: jenkins/inbound-agent
      args:
        - "$(JENKINS_SECRET)"
        - "$(JENKINS_NAME)"

    - name: nodejs
      image: node:latest
      command: ["cat"]
      tty: true

    - name: gitleaks
      image: zricethezav/gitleaks:latest
      command: ["cat"]
      tty: true

    - name: dependency-check
      image: owasp/dependency-check:latest
      command: ["cat"]
      tty: true

    - name: sonar
      image: sonarsource/sonar-scanner-cli:latest
      command: ["cat"]
      tty: true

    - name: docker-cli
      image: docker:24-cli
      command: ["cat"]
      tty: true

    - name: trivy
      image: aquasec/trivy:latest
      command: ["cat"]
      tty: true

    - name: kubectl
      image: bitnami/kubectl:latest
      command: ["cat"]
      tty: true
        
    
